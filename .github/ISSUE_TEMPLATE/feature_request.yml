name: Feature request
description: Suggest a new sync target, CLI command, or enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the actual end goal, not the solution
      placeholder: "e.g. I want my custom search engines synced across devices"
    validations:
      required: true

  - type: textarea
    id: considered
    attributes:
      label: What have you considered?
      description: Why doesn't the existing setup do this? What workarounds did you try?
    validations:
      required: true

  - type: textarea
    id: fit
    attributes:
      label: How might it fit?
      description: If you have thought about implementation, which Target module? Does it need new Helium-side reads or writes?

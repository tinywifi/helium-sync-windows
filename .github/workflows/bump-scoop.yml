name: bump-scoop

# Triggered when a GitHub Release is published (i.e. after release.yml
# finishes attaching the ZIPs on a v* tag).
#
# Computes the SHA256 of the amd64 and arm64 ZIPs, rewrites
# bucket/helium-sync.json in tinywifi/scoop-bucket, and pushes it to main.
#
# Requires a fine-grained PAT stored as `SCOOP_BUCKET_TOKEN` secret with:
#   Repository access: Only tinywifi/scoop-bucket
#   Permissions:       Contents read+write
#
# To set it up:
#   1. https://github.com/settings/personal-access-tokens (fine-grained)
#   2. Scope it to tinywifi/scoop-bucket with Contents read+write
#   3. gh secret set SCOOP_BUCKET_TOKEN \
#        --repo tinywifi/helium-sync-windows --body <token>

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  bump:
    name: update Scoop manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: compute SHA256s of release ZIPs
        id: shas
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          REPO="tinywifi/helium-sync-windows"

          amd_url="https://github.com/${REPO}/releases/download/${TAG}/helium-sync-windows-${TAG}-amd64.zip"
          arm_url="https://github.com/${REPO}/releases/download/${TAG}/helium-sync-windows-${TAG}-arm64.zip"

          amd_sha=$(curl -fsSL "$amd_url" | sha256sum | awk '{print $1}')
          arm_sha=$(curl -fsSL "$arm_url" | sha256sum | awk '{print $1}')

          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "amd_sha=$amd_sha"  >> "$GITHUB_OUTPUT"
          echo "arm_sha=$arm_sha"  >> "$GITHUB_OUTPUT"

          echo "tag:     $TAG"
          echo "amd_sha: $amd_sha"
          echo "arm_sha: $arm_sha"

      - name: checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: tinywifi/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: bucket-repo

      - name: rewrite manifest
        env:
          TAG:     ${{ steps.shas.outputs.tag }}
          AMD_SHA: ${{ steps.shas.outputs.amd_sha }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha }}
        run: |
          python3 - bucket-repo/bucket/helium-sync.json "$TAG" "$AMD_SHA" "$ARM_SHA" <<'PY'
          import json, sys
          path, tag, amd_sha, arm_sha = sys.argv[1:]
          with open(path) as f:
              m = json.load(f)
          ver = tag.lstrip("v")
          m["version"] = ver
          repo = "tinywifi/helium-sync-windows"
          base = f"https://github.com/{repo}/releases/download/{tag}"
          m["architecture"]["64bit"]["url"]  = f"{base}/helium-sync-windows-{tag}-amd64.zip"
          m["architecture"]["64bit"]["hash"] = f"sha256:{amd_sha}"
          m["architecture"]["arm64"]["url"]  = f"{base}/helium-sync-windows-{tag}-arm64.zip"
          m["architecture"]["arm64"]["hash"] = f"sha256:{arm_sha}"
          with open(path, "w") as f:
              json.dump(m, f, indent=4)
              f.write("\n")
          PY

      - name: push manifest to scoop-bucket
        env:
          TAG: ${{ steps.shas.outputs.tag }}
        run: |
          cd bucket-repo

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bucket/helium-sync.json
          git commit -m "helium-sync ${TAG}"
          git push origin HEAD:main

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build, publish, update Scoop
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: test
        run: go test ./...

      - name: create release ZIPs
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force dist | Out-Null

          foreach ($arch in @("amd64", "arm64")) {
            $stage = "staging\$arch"
            New-Item -ItemType Directory -Force "$stage\bin" | Out-Null

            $env:GOOS = "windows"
            $env:GOARCH = $arch
            $env:CGO_ENABLED = "0"
            go build -trimpath -ldflags="-s -w" -o "$stage\bin\helium-sync.exe" ./cmd/helium-sync

            Copy-Item bin\helium-sync.bat "$stage\bin\helium-sync.bat"
            Copy-Item README.md "$stage\README.md"
            Copy-Item LICENSE "$stage\LICENSE"

            Compress-Archive -Path "$stage\*" -DestinationPath "dist\helium-sync-windows-$tag-$arch.zip"
          }

      - name: verify artifacts
        shell: pwsh
        run: |
          Get-ChildItem dist\
          foreach ($arch in @("amd64", "arm64")) {
            $path = "dist\helium-sync-windows-${{ github.ref_name }}-$arch.zip"
            if (-not (Test-Path $path)) {
              throw "Missing artifact: $path"
            }
          }

      - name: prepare release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $allTags = git tag --sort=-v:refname
          $prevTag = ""
          for ($i = 0; $i -lt $allTags.Count; $i++) {
            if ($allTags[$i] -eq $tag -and $i + 1 -lt $allTags.Count) {
              $prevTag = $allTags[$i + 1]
              break
            }
          }
          if ($prevTag) { $logRange = "$prevTag..HEAD" } else { $logRange = "HEAD" }
          $commits = git log $logRange --oneline --no-merges

          $highlights = @()
          $stripVerbs = '^(add|adds|added|fix|fixes|fixed|update|updates|updated|implement|implements|implemented|refactor|refactors|refactored|remove|removes|removed|improve|improves|improved|introduce|introduced|create|creates|created)\s+'
          $featCommits = $commits | Where-Object { $_ -match "^[\da-f]+ feat(\(.+\))?:\s*(.+)" }
          $fixCommits = $commits | Where-Object { $_ -match "^[\da-f]+ fix(\(.+\))?:\s*(.+)" }
          $docsCommits = $commits | Where-Object { $_ -match "^[\da-f]+ docs(\(.+\))?:\s*(.+)" }
          $otherCommits = $commits | Where-Object { $_ -notmatch "^[\da-f]+ (feat|fix|docs|ci|test|chore|build)(\(.+\))?:\s*" }

          if ($featCommits.Count -gt 0) {
            $highlights += ($featCommits | ForEach-Object {
              $msg = ($_ -replace "^[\da-f]+\s+(feat(\(.+\))?:\s*)", "").Trim()
              $msg = ($msg -replace $stripVerbs, "").Trim()
              "- Added $msg"
            }) -join "`n"
          }
          if ($fixCommits.Count -gt 0) {
            $highlights += ($fixCommits | ForEach-Object {
              $msg = ($_ -replace "^[\da-f]+\s+(fix(\(.+\))?:\s*)", "").Trim()
              $msg = ($msg -replace $stripVerbs, "").Trim()
              "- Fixed $msg"
            }) -join "`n"
          }
          if ($docsCommits.Count -gt 0) {
            $highlights += ($docsCommits | ForEach-Object {
              $msg = ($_ -replace "^[\da-f]+\s+(docs(\(.+\))?:\s*)", "").Trim()
              $msg = ($msg -replace $stripVerbs, "").Trim()
              "- Updated $msg"
            }) -join "`n"
          }
          if ($otherCommits.Count -gt 0) {
            $highlights += ($otherCommits | ForEach-Object {
              $msg = ($_ -replace "^[\da-f]+\s+", "").Trim()
              "- $msg"
            }) -join "`n"
          }

          if ($featCommits.Count -gt 0 -and $fixCommits.Count -gt 0) {
            $shouldUpdate = "Yes. This release adds new features and fixes."
          } elseif ($featCommits.Count -gt 0) {
            $shouldUpdate = "Yes. This release adds new features."
          } elseif ($fixCommits.Count -gt 0) {
            $shouldUpdate = "Yes. This release contains important fixes."
          } elseif ($commits.Count -gt 0) {
            $shouldUpdate = "Recommended. Contains $($commits.Count) change(s)."
          } else {
            $shouldUpdate = "Minor release - review the changes below."
          }

          $template = Get-Content ".github\release-notes-template.md" -Raw
          $notes = $template.Replace("{{TAG}}", $tag).Replace("{{SHOULD_UPDATE}}", $shouldUpdate)
          if (($highlights -join "") -eq "") {
            $notes = $notes.Replace("{{HIGHLIGHTS}}", "No user-facing changes.")
          } else {
            $notes = $notes.Replace("{{HIGHLIGHTS}}", ($highlights -join "`n"))
          }
          $notes | Set-Content "dist\release-notes.md" -Encoding utf8

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/helium-sync-windows-*-amd64.zip
            dist/helium-sync-windows-*-arm64.zip
          body_path: dist/release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: checkout scoop-bucket
        uses: actions/checkout@v6
        with:
          repository: tinywifi/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: bucket-repo

      - name: publish Scoop manifest
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $repo = "tinywifi/helium-sync-windows"
          $base = "https://github.com/$repo/releases/download/$tag"
          $manifestPath = "bucket-repo\bucket\helium-sync.json"

          $amdSha = (Get-FileHash "dist\helium-sync-windows-$tag-amd64.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          $armSha = (Get-FileHash "dist\helium-sync-windows-$tag-arm64.zip" -Algorithm SHA256).Hash.ToLowerInvariant()

          $manifest = Get-Content "scoop\helium-sync.json" -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.architecture."64bit".url = "$base/helium-sync-windows-$tag-amd64.zip"
          $manifest.architecture."64bit".hash = "sha256:$amdSha"
          $manifest.architecture.arm64.url = "$base/helium-sync-windows-$tag-arm64.zip"
          $manifest.architecture.arm64.hash = "sha256:$armSha"
          $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath -Encoding utf8

          Set-Location bucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/helium-sync.json
          if (git diff --cached --quiet) {
            Write-Host "Scoop manifest already up to date"
          } else {
            git commit -m "helium-sync $tag"
            git push origin HEAD:main
          }

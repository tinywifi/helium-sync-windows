name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Windows: build the Go binary and run all tests.
  # ──────────────────────────────────────────────────────────────────────
  windows:
    name: build leveldb-writer + tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: install python deps
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -r requirements.txt

      - name: build leveldb-writer.exe
        run: |
          cd bin\_go\leveldb_writer
          go build -trimpath -ldflags="-s -w" -o ..\..\leveldb-writer.exe .
          ..\leveldb-writer.exe 2>&1; $true   # prints usage; non-zero exit is fine

      - name: run tests
        run: .venv\Scripts\python -m unittest discover tests/ -v

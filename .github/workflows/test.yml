name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: go mod verify
        run: go mod verify

      - name: go test
        run: go test ./...

      - name: build CLI
        shell: pwsh
        run: |
          if ("${{ runner.os }}" -eq "Windows") {
            go build -trimpath -ldflags="-s -w" -o helium-sync.exe ./cmd/helium-sync
          } else {
            go build -trimpath -ldflags="-s -w" -o helium-sync ./cmd/helium-sync
          }

  windows-package:
    name: release dry package
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: create dry-run release zips
        shell: pwsh
        run: |
          $tag = "v0.0.0-ci"
          New-Item -ItemType Directory -Force dist | Out-Null

          foreach ($arch in @("amd64", "arm64")) {
            $stage = "staging\$arch"
            New-Item -ItemType Directory -Force "$stage\bin" | Out-Null

            $env:GOOS = "windows"
            $env:GOARCH = $arch
            go build -trimpath -ldflags="-s -w" -o "$stage\bin\helium-sync.exe" ./cmd/helium-sync
            Copy-Item bin\helium-sync.bat "$stage\bin\helium-sync.bat"
            Copy-Item README.md "$stage\README.md"
            Copy-Item LICENSE "$stage\LICENSE"

            Compress-Archive -Path "$stage\*" -DestinationPath "dist\helium-sync-windows-$tag-$arch.zip"
          }

          foreach ($path in @(
            "dist\helium-sync-windows-$tag-amd64.zip",
            "dist\helium-sync-windows-$tag-arm64.zip"
          )) {
            if (-not (Test-Path $path)) {
              throw "Missing dry-build artifact: $path"
            }
          }

      - name: validate Scoop manifest
        shell: pwsh
        run: |
          $raw = Get-Content "scoop\helium-sync.json" -Raw
          $manifest = $raw | ConvertFrom-Json
          if (-not $manifest.version) { throw "Scoop manifest version is missing" }
          if (-not $manifest.architecture."64bit".url) { throw "Scoop manifest architecture.64bit.url is missing" }
          if (-not $manifest.architecture.arm64.url) { throw "Scoop manifest architecture.arm64.url is missing" }
          $binJson = $manifest.bin | ConvertTo-Json -Compress
          if ($binJson -notlike '*helium-sync.bat*') {
            throw "Scoop manifest bin must include bin\helium-sync.bat"
          }
          if ($raw -match 'Python|requirements|venv|leveldb-writer|PLACEHOLDER') {
            throw "Scoop manifest still references old Python/leveldb packaging"
          }

      - name: validate Scoop autoupdate
        shell: pwsh
        run: |
          $manifest = Get-Content "scoop\helium-sync.json" -Raw | ConvertFrom-Json
          if ($manifest.checkver.github -ne "https://github.com/tinywifi/helium-sync-windows") {
            throw "Scoop checkver GitHub URL is wrong"
          }
          $amd = $manifest.autoupdate.architecture."64bit".url
          $arm = $manifest.autoupdate.architecture.arm64.url
          if ($amd -ne "https://github.com/tinywifi/helium-sync-windows/releases/download/v`$version/helium-sync-windows-v`$version-amd64.zip") {
            throw "Scoop amd64 autoupdate URL is wrong"
          }
          if ($arm -ne "https://github.com/tinywifi/helium-sync-windows/releases/download/v`$version/helium-sync-windows-v`$version-arm64.zip") {
            throw "Scoop arm64 autoupdate URL is wrong"
          }
